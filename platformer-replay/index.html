<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platformer Replay — Event Sourcing Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #f0f6fc;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3dd68c;
      --red:       #f85149;
      --gold:      #ffd700;
      --font:      'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .badge.green { border-color: var(--green); color: var(--green); }

    /* ── Layout principal ── */
    .app-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* ── Zone controls (au-dessus du canvas) ── */
    .controls {
      grid-column: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: #2d333b; border-color: #8b949e; }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.primary { background: #1f6feb; border-color: #388bfd; }
    .btn.primary:hover:not(:disabled) { background: #388bfd; }
    .btn.danger  { background: #3d1f1f; border-color: var(--red); color: var(--red); }
    .btn.danger:hover:not(:disabled)  { background: #5a2020; }
    .btn.replay  { background: #1a2a3d; border-color: var(--accent); color: var(--accent); }
    .btn.replay:hover:not(:disabled)  { background: #1f3650; }

    .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    .seed-group {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto;
    }
    .seed-group label { color: var(--muted); font-size: 11px; }
    .seed-input {
      width: 90px;
      padding: 5px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
    }
    .seed-input:focus { outline: none; border-color: var(--accent); }

    #status-bar {
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* ── Canvas ── */
    .canvas-wrapper {
      grid-column: 1;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: 4px;
      image-rendering: pixelated;
    }

    /* ── Panneau droit : event log ── */
    .log-panel {
      grid-column: 2;
      grid-row: 1 / 3;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--surface);
      flex-shrink: 0;
    }
    .log-header .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #event-log {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scroll-behavior: smooth;
    }
    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Rows injectées par eventlog.ts */
    :global(.ev-row) {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 0 8px;
      padding: 3px 14px;
      font-size: 11px;
      line-height: 1.6;
      transition: background 0.15s;
    }
    :global(.ev-row:hover) { background: var(--surface2); }
    :global(.ev-row.ev-new) {
      background: rgba(88,166,255,0.08);
      animation: flashIn 0.3s ease;
    }
    @keyframes flashIn { from { background: rgba(88,166,255,0.25); } }
    :global(.ev-tick) { color: var(--muted); font-size: 10px; padding-top: 1px; }
    :global(.ev-type) { font-weight: 700; font-size: 11px; }
    :global(.ev-payload) {
      grid-column: 2;
      color: var(--muted);
      font-size: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Footer légende ── */
    .legend {
      grid-column: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 7px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 11px;
      color: var(--muted);
    }
    .legend kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 20px;
      padding: 0 5px;
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--border);
      border-radius: 4px;
      background: var(--surface2);
      font-family: var(--font);
      font-size: 10px;
      color: var(--text);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    Platformer Replay
  </div>
  <span class="badge">Event Sourcing Demo</span>
  <span class="badge green">TypeScript</span>
</header>

<div class="app-layout">

  <!-- Controls -->
  <div class="controls">
    <button class="btn primary" id="btn-play">▶ Jouer</button>
    <div class="sep"></div>
    <button class="btn replay" id="btn-replay" disabled>↺ Replay</button>
    <button class="btn danger"  id="btn-killcam" disabled>⏮ Killcam</button>
    <div class="sep"></div>
    <button class="btn" id="btn-new">⟳ Nouveau niveau</button>
    <span id="status-bar">Prêt — clique sur ▶ Jouer</span>
    <div class="seed-group">
      <label>seed</label>
      <input type="number" id="seed-input" class="seed-input" placeholder="42">
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrapper">
    <canvas id="game-canvas" width="780" height="380"></canvas>
  </div>

  <!-- Event Log -->
  <div class="log-panel">
    <div class="log-header">
      <span>Event Log</span>
      <div class="dot"></div>
    </div>
    <div id="event-log">
      <div style="color:#8b949e;padding:12px 14px;font-size:11px">En attente d'une partie…</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><kbd>←</kbd><kbd>→</kbd> ou <kbd>A</kbd><kbd>D</kbd> déplacer</div>
    <div class="legend-item"><kbd>↑</kbd> ou <kbd>W</kbd> ou <kbd>Space</kbd> sauter</div>
  </div>

</div>

<!-- Import map pour les modules TypeScript compilés -->
<script type="module">
// Inline : on importe main.ts compilé en JS via un bundler (voir deno.json)
// Pour la démo standalone, tout est inliné ci-dessous
</script>

<!-- Version standalone compilée (générée par build.ts) -->
<script type="module" src="./dist/main.js"></script>

</body>
</html>
